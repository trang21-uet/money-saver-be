version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: expense-manager-postgres
    environment:
      POSTGRES_DB: expense_manager_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense-manager-network

  redis:
    image: redis:7-alpine
    container_name: expense-manager-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - expense-manager-network

volumes:
  postgres_data:
  redis_data:

networks:
  expense-manager-network:
    driver: bridge
